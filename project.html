<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto | Gabriel Bento</title>
  <meta name="description" content="Detalhes de projeto do portfólio de Gabriel Bento.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body class="project-detail-page">
  <div class="page-noise" aria-hidden="true"></div>
  <div class="cursor-glow" aria-hidden="true"></div>

  <header class="topbar shell detail-topbar">
    <a class="brand" href="./index.html">Portfolio</a>
    <nav class="menu" aria-label="Principal">
      <a href="./index.html#projects">Projetos</a>
      <a href="./index.html#about">Sobre</a>
      <a href="./index.html#contact">Contato</a>
    </nav>
  </header>

  <main class="detail-main">
    <section class="shell detail-hero reveal">
      <a class="detail-back" id="detail-back-link" href="./index.html#projects">← Voltar ao portfólio</a>
      <p class="eyebrow" id="detail-category"></p>
      <h1 class="detail-title" id="detail-title"></h1>
      <p class="detail-summary" id="detail-summary"></p>
      <p class="detail-description" id="detail-description"></p>
    </section>

    <section class="shell detail-gallery-section reveal-delay">
      <div class="detail-section-head">
        <p class="eyebrow">Mockups</p>
        <h2>Visuais do projeto</h2>
      </div>
      <div class="detail-gallery" id="detail-gallery"></div>
    </section>

    <section class="shell detail-content-grid">
      <article class="detail-info reveal">
        <div class="detail-section-head">
          <p class="eyebrow">Visão geral</p>
          <h2>Contexto e execução</h2>
        </div>
        <div class="detail-copy-block">
          <h3>Objetivo</h3>
          <p id="detail-objective"></p>
        </div>
        <div class="detail-copy-block">
          <h3>Tecnologias utilizadas</h3>
          <div class="detail-tags" id="detail-technologies"></div>
        </div>
        <div class="detail-copy-block">
          <h3>Principais funcionalidades</h3>
          <ul class="detail-feature-list" id="detail-features"></ul>
        </div>
      </article>

      <article class="detail-code reveal-delay">
        <div class="detail-section-head">
          <p class="eyebrow">Código</p>
          <h2>Prints estilizados</h2>
        </div>
        <div class="detail-code-stack" id="detail-code-stack"></div>
      </article>
    </section>

    <section class="shell detail-project-nav reveal-delay">
      <a class="detail-project-link detail-project-link-prev" id="detail-prev-project" href="./index.html#projects">
        <span>Projeto anterior</span>
        <strong>Voltar ao início</strong>
      </a>
      <a class="detail-project-link detail-project-link-next" id="detail-next-project" href="./index.html#projects">
        <span>Próximo projeto</span>
        <strong>Voltar ao início</strong>
      </a>
    </section>
  </main>

  <script src="./src/data/portfolioData.js"></script>
  <script src="./src/project-detail.js"></script>
</body>
</html>
